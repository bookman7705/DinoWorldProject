<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dino World AR View</title>
  <link rel="stylesheet" href="./src/styles/main.css">

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js"
    }
  }
  </script>
</head>
<body class="ar-body">
  <div id="ar-overlay" class="ar-overlay">
    <button id="back-btn" class="overlay-btn">Back</button>
    <div class="overlay-panel">
      <p id="ar-model-name" class="overlay-title"></p>
      <p id="ar-help" class="overlay-help">Move phone to detect a horizontal surface. Tap to place. Swipe to move. Pinch to scale. Twist to rotate.</p>
      <p id="ar-scale" class="overlay-scale" hidden aria-live="polite">Scale: 100%</p>
      <p id="ar-status" class="overlay-status" aria-live="polite"></p>
    </div>
  </div>

  <script type="module" src="./src/js/ar-view.js"></script>
</body>
</html>
