<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stable AR Visible</title>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { MindARThree } from 'mindar-image-three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* =====================
   MINDAR SETUP
===================== */
const mindarThree = new MindARThree({
  container: document.querySelector("#container"),
  imageTargetSrc: "https://raw.githubusercontent.com/bookman7705/my-monster-games/main/mind/example.mind",
  filterMinCF: 0.0001,
  filterBeta: 0.01
});

const { renderer, scene, camera } = mindarThree;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

/* =====================
   ANCHOR & MODEL GROUP
===================== */
const anchor = mindarThree.addAnchor(0);

/* Direct model group attached to anchor (NO smoothing layer) */
const modelGroup = new THREE.Group();
anchor.group.add(modelGroup);

/* =====================
   LIGHTING
===================== */
scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(0,5,5);
scene.add(dirLight);

/* =====================
   MODEL LOADING
===================== */
const loader = new GLTFLoader();
let mixer;

loader.load(
  "https://raw.githubusercontent.com/bookman7705/my-monster-games/main/rex.glb",
  (gltf) => {
    const model = gltf.scene;

    model.scale.set(0.1, 0.1, 0.1);
    model.rotation.set(Math.PI / 2, 0, 0);

    /* attach directly */
    modelGroup.add(model);

    if (gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      const action = mixer.clipAction(gltf.animations[0]);
      action.loop = THREE.LoopRepeat;
      action.play();
    }
  }
);

/* =====================
   CLOCK
===================== */
const clock = new THREE.Clock();

/* =====================
   START LOOP
===================== */
const start = async () => {
  await mindarThree.start();

  renderer.setAnimationLoop(() => {
    const delta = clock.getDelta();
    if (mixer) mixer.update(delta);

    /* ❌ SMOOTHING REMOVED:
       no lerp, no slerp, no interpolation
       anchor drives model directly */
       
    renderer.render(scene, camera);
  });
};

/* =====================
   BUTTONS
===================== */
document.querySelector("#startButton").addEventListener("click", start);

document.querySelector("#stopButton").addEventListener("click", () => {
  mindarThree.stop();
  renderer.setAnimationLoop(null);
});
</script>

<style>
body { margin:0; overflow:hidden; }
#container { width:100vw; height:100vh; position:relative; overflow:hidden; }
#control { position:fixed; top:0; left:0; z-index:2; background:white; padding:5px; }
</style>
</head>

<body>
<div id="control">
<button id="startButton">Start</button>
<button id="stopButton">Stop</button>
</div>
<div id="container"></div>
</body>
</html>
