<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino World AR</title>
  <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>
  <main class="menu-screen">
    <button
      id="settings-btn"
      class="menu-settings-btn"
      type="button"
      aria-label="Open settings"
      aria-haspopup="dialog"
      aria-controls="settings-menu"
      aria-expanded="false"
    >
      <img src="./gfx/settings.svg" alt="" width="24" height="24" class="menu-settings-icon">
    </button>

    <section class="menu-card">
      <p class="eyebrow">Dino World</p>
      <h1>Choose View Mode</h1>
      <p id="model-info" class="subtitle"></p>

      <div class="button-stack">
        <button id="view-ar-btn" class="menu-btn menu-btn-primary" disabled>View in AR</button>
        <button id="image-scan-btn" class="menu-btn menu-btn-secondary">Image Scan</button>
        <button id="view-3d-btn" class="menu-btn menu-btn-secondary" disabled>3D View</button>
      </div>

      <p id="status-message" class="status-message" aria-live="polite"></p>
    </section>
  </main>

  <div
    id="settings-menu"
    class="settings-overlay"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="settings-menu-title"
  >
    <div class="settings-panel">
      <h2 id="settings-menu-title" class="settings-title">Settings</h2>
      <div class="settings-list" role="group" aria-labelledby="settings-menu-title">
        <label class="settings-checkbox-row" for="alt-download-source">
          <span class="settings-checkbox-label">Alt Download Source</span>
          <input
            type="checkbox"
            id="alt-download-source"
            class="settings-checkbox"
            name="alt-download-source"
          >
        </label>
      </div>
      <button type="button" class="settings-close-btn">Close</button>
    </div>
  </div>

  <script type="module" src="./src/js/app.js"></script>
</body>
</html>
